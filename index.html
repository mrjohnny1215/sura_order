<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수라간 실시간 발주 체크리스트</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; }
        header { max-width: 1200px; margin: 0 auto 20px; background: var(--primary-color); color: white; padding: 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        
        .title-zone h1 { font-size: 24px; }
        .title-zone .today-date { font-size: 14px; color: #f1c40f; margin-top: 4px; font-weight: bold; }
        
        .summary-box { background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 5px; text-align: right; }
        .summary-box span { font-weight: bold; color: #f1c40f; }

        .controls { max-width: 1200px; margin: 0 auto 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        .search-bar { flex: 1; min-width: 200px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .filter-select { padding: 10px; border: 1px solid #ddd; border-radius: 5px; background: white; }
        .btn-copy { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-copy:hover { background: #219653; }

        .grid-container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .vendor-card { background: var(--card-bg); border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 20px; border-top: 5px solid var(--primary-color); }
        .vendor-name { font-size: 18px; margin-bottom: 15px; padding-bottom: 5px; border-bottom: 2px solid #eee; color: var(--primary-color); display: flex; justify-content: space-between; align-items: center; }
        .vendor-tag { font-size: 11px; background: #eef2f7; padding: 3px 8px; border-radius: 10px; color: #555; font-weight: bold; }

        .item-list { list-style: none; }
        .item-row { padding: 12px 0; border-bottom: 1px solid #f1f1f1; display: flex; flex-direction: column; gap: 8px; }
        .item-row:hover { background-color: #fafafa; }
        
        .item-main-zone { display: flex; align-items: center; gap: 12px; cursor: pointer; width: 100%; }
        .item-info { flex: 1; }
        .item-name { font-weight: bold; font-size: 14px; color: #333; }
        .item-details { font-size: 11px; color: #888; margin-top: 2px; }
        
        .checkbox-btn { width: 22px; height: 22px; border: 2px solid #ddd; border-radius: 5px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; background: white; flex-shrink: 0; }
        .checkbox-btn::after { content: '✓'; color: white; display: none; font-weight: bold; font-size: 13px; }
        
        .volume-zone { display: none; flex-wrap: wrap; gap: 6px; padding-left: 34px; margin-top: 4px; }
        .opt-btn { background: #f1f3f5; border: 1px solid #dee2e6; padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; color: #495057; font-weight: bold; }
        .opt-btn.active { background: #e74c3c; color: white; border-color: #e74c3c; }
        .custom-input { width: 90px; padding: 4px 8px; border: 1px solid #ced4da; border-radius: 4px; font-size: 12px; font-weight: bold; text-align: center; }

        .item-row.checked { background-color: #fff8f8; }
        .item-row.checked .checkbox-btn { background: var(--accent-color); border-color: var(--accent-color); }
        .item-row.checked .checkbox-btn::after { display: block; }
        .item-row.checked .item-name { color: var(--accent-color); }
        .item-row.checked .volume-zone { display: flex; }

        @media (max-width: 600px) {
            header { flex-direction: column; text-align: center; }
            .summary-box { text-align: center; width: 100%; }
            .controls { flex-direction: column; }
        }
    </style>
</head>

        </div>
        <div class="summary-box">

            { id: 77, vendor: "인터넷 발주 (저녁 마감)", category: "매장잡화", name: "물티슈", options: ["2박스", "1박스"], cycle: "주 1회 (마감확인)" },

            { id: 79, vendor: "인터넷 발주 (저녁 마감)", category: "매장잡화", name: "일회용 반앞치마", options: ["1박스"], cycle: "필요시" },
            { id: 80, vendor: "인터넷 발주 (저녁 마감)", category: "매장잡화", name: "츄파춥스 막대사탕 미니", options: ["100p"], cycle: "필요시" },
            { id: 81, vendor: "인터넷 발주 (저녁 마감)", category: "매장잡화", name: "수저포장지 (수저집)", options: ["4박스"], cycle: "필요시" },
            { id: 82, vendor: "인터넷 발주 (저녁 마감)", category: "매장잡화", name: "치실", options: ["2박스"], cycle: "필요시" },
            { id: 83, vendor: "인터넷 발주 (저녁 마감)", category: "매장잡화", name: "이지락 워터건 (분무기류)", options: ["1개"], cycle: "필요시" },
            { id: 84, vendor: "인터넷 발주 (저녁 마감)", category: "매장잡화", name: "크린콜", options: ["1말통"], cycle: "필요시" },

            { id: 86, vendor: "인터넷 발주 (저녁 마감)", category: "매장잡화", name: "냅킨 / 행주 / 박스테이프", options: ["1박스"], cycle: "필요시" },
            { id: 87, vendor: "인터넷 발주 (저녁 마감)", category: "매장잡화", name: "아이콘 칼라 화일 (명세서용)", options: ["1개"], cycle: "필요시" },
            { id: 88, vendor: "인터넷 발주 (저녁 마감)", category: "매장잡화", name: "커터칼", options: ["5개"], cycle: "필요시" },
            { id: 89, vendor: "인터넷 발주 (저녁 마감)", category: "매장잡화", name: "가글", options: ["2박스"], cycle: "필요시" },
            { id: 90, vendor: "인터넷 발주 (저녁 마감)", category: "매장잡화", name: "니트릴장갑 / 라텍스장갑", options: ["1박스"], cycle: "필요시" },
            { id: 91, vendor: "인터넷 발주 (저녁 마감)", category: "매장잡화", name: "쓰레기봉투 (파란색/검정색)", options: ["1묶음"], cycle: "필요시" },
            { id: 92, vendor: "인터넷 발주 (저녁 마감)", category: "매장잡화", name: "위생장갑 / 롤팩 / 고무장갑", options: ["1박스"], cycle: "필요시" },
            { id: 93, vendor: "인터넷 발주 (저녁 마감)", category: "매장잡화", name: "퐁퐁 / 주방세제 / 세제(비트)", options: ["1말", "7kg"], cycle: "필요시" },
            { id: 94, vendor: "인터넷 발주 (저녁 마감)", category: "매장잡화", name: "수세미 (철/녹색) / 식세기 세제", options: ["1박스"], cycle: "필요시" }
        ];

        let selectedState = {};
        let formattedDateString = "";

        function getTodayDate() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            
            const weekDays = ["일", "월", "화", "수", "목", "금", "토"];
            const dayOfWeek = weekDays[now.getDay()];

            formattedDateString = `${year}년 ${month}월 ${date}일 (${dayOfWeek})`;
            document.getElementById('print-date').textContent = `📅 발주 기준일: ${formattedDateString}`;
        }

        function init() {
            getTodayDate();

            const filterSelect = document.getElementById('filter-vendor');
            const vendors = [...new Set(orderData.map(item => item.vendor))];
            
            vendors.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v;
                opt.textContent = v;
                filterSelect.appendChild(opt);
            });

            orderData.forEach(item => {
                selectedState[item.id] = {
                    checked: false,
                    value: item.options[0] || ""
                };
            });

            renderCards(orderData);
        }

        function renderCards(data) {
            const container = document.getElementById('card-container');
            container.innerHTML = '';

            // 거래처 단위로만 완벽히 그룹핑 (카테고리로 분리하지 않음)
            const grouped = data.reduce((acc, item) => {
                if (!acc[item.vendor]) acc[item.vendor] = [];
                acc[item.vendor].push(item);
                return acc;
            }, {});

            for (const vendor in grouped) {
                const card = document.createElement('div');
                card.className = 'vendor-card';
                
                // 식자재 종합 카드로 묶인 경우 직관적으로 '식자재 마트' 등으로 종합 태그 지정
                const vTag = vendor.includes("이성현") ? "종합식자재" : grouped[vendor][0].category;
                
                card.innerHTML = `
                    <div class="vendor-name">
                        <span>${vendor}</span>
                        <span class="vendor-tag">${vTag}</span>
                    </div>
                    <ul class="item-list">
                        ${grouped[vendor].map(item => {
                            const state = selectedState[item.id];
                            const isChecked = state.checked ? 'checked' : '';
                            
                            let optionButtons = item.options.map(opt => {
                                const activeClass = state.value === opt ? 'active' : '';
                                return `<button class="opt-btn ${activeClass}" onclick="selectOption(${item.id}, '${opt}', this)">${opt}</button>`;
                            }).join('');

                            return `
                                <li class="item-row ${isChecked}" id="row-${item.id}">
                                    <div class="item-main-zone" onclick="toggleItem(${item.id})">
                                        <div class="checkbox-btn"></div>
                                        <div class="item-info">
                                            <div class="item-name">${item.name}</div>
                                            <div class="item-details">[${item.category}] 주기: ${item.cycle}</div>
                                        </div>
                                    </div>
                                    <div class="volume-zone">
                                        ${optionButtons}
                                        <input type="text" class="custom-input" placeholder="직접입력" value="${item.options.includes(state.value) ? '' : state.value}" oninput="customInput(${item.id}, this)">
                                    </div>
                                </li>
                            `;
                        }).join('')}
                    </ul>
                `;
                container.appendChild(card);
            }
        }

        function toggleItem(id) {
            const row = document.getElementById(`row-${id}`);
            selectedState[id].checked = !selectedState[id].checked;
            
            if (selectedState[id].checked) {
                row.classList.add('checked');
            } else {
                row.classList.remove('checked');
            }
            updateTotalCount();
        }

        function selectOption(id, opt, btnBtn) {
            selectedState[id].value = opt;
            const pZone = btnBtn.parentElement;
            pZone.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
            btnBtn.classList.add('active');
            pZone.querySelector('.custom-input').value = '';
        }

        function customInput(id, input) {
            selectedState[id].value = input.value;
            const pZone = input.parentElement;
            pZone.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
        }

        function updateTotalCount() {
            const count = Object.values(selectedState).filter(s => s.checked).length;
            document.getElementById('total-checked').textContent = count;
        }

        function filterItems() {
            const searchText = document.getElementById('search').value.toLowerCase();
            const selectedVendor = document.getElementById('filter-vendor').value;

            const filtered = orderData.filter(item => {
                const matchesSearch = item.name.toLowerCase().includes(searchText) || item.category.toLowerCase().includes(searchText);
                const matchesVendor = selectedVendor === 'all' || item.vendor === selectedVendor;
                return matchesSearch && matchesVendor;
            });

            renderCards(filtered);
        }

        function copyToClipboard() {
            const activeIds = Object.keys(selectedState).filter(id => selectedState[id].checked);
            
            if (activeIds.length === 0) {
                alert('선택된 발주 품목이 없습니다!');
                return;
            }

            let text = `[${formattedDateString} 수라간 발주 요청 건]\n\n`;
            const activeItems = orderData.filter(item => selectedState[item.id].checked);
            
            const grouped = activeItems.reduce((acc, item) => {
                if (!acc[item.vendor]) acc[item.vendor] = [];
                acc[item.vendor].push(item);
                return acc;
            }, {});

            for (const vendor in grouped) {
                text += `■ ${vendor}\n`;
                grouped[vendor].forEach(item => {
                    const finalVal = selectedState[item.id].value || "수량미정";
                    text += `- ${item.name} : ${finalVal}\n`;
                });
                text += '\n';
            }

            navigator.clipboard.writeText(text.trim()).then(() => {
                alert('하나로 합쳐진 발주 리스트가 복사되었습니다!\n카카오톡 대화창에 붙여넣기 하세요.');
            }).catch(() => {
                alert('복사에 실패했습니다.');
            });
        }

        window.onload = init;
    </script>
</body>
